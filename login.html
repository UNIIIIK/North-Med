<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>North Med Diagnostics - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:system-ui,-apple-system,Segoe UI,sans-serif;
background:
radial-gradient(circle at 20% 20%, #1f2937 0%, transparent 40%),
radial-gradient(circle at 80% 80%, #111827 0%, transparent 40%),
#020617;
color:#e5e7eb;
}

/* login card */

.login-card{
width:380px;
background:rgba(15,23,42,0.85);
backdrop-filter:blur(16px);
border-radius:18px;
border:1px solid rgba(148,163,184,0.25);
box-shadow:0 25px 60px rgba(0,0,0,0.6);
padding:28px;
}

/* logo */

.login-logo{
text-align:center;
margin-bottom:10px;
}

.login-logo img{
width:80px;
height:80px;
border-radius:50%;
background:white;
box-shadow:0 8px 25px rgba(0,0,0,0.6);
}

/* titles */

.login-title{
text-align:center;
font-size:0.95rem;
letter-spacing:.12em;
margin-top:10px;
}

.login-subtitle{
text-align:center;
font-size:.8rem;
color:#9ca3af;
margin-bottom:20px;
}

/* inputs */

.input-group-text{
background:#020617;
border:1px solid rgba(148,163,184,0.4);
color:#9ca3af;
}

.form-control{
background:#020617;
border:1px solid rgba(148,163,184,0.4);
color:#e5e7eb;
}

.form-control:focus{
border-color:#6366f1;
box-shadow:0 0 0 1px #6366f1;
background:#020617;
}

/* button */

.btn-login{
width:100%;
margin-top:10px;
background:linear-gradient(135deg,#6366f1,#7c3aed);
border:none;
border-radius:999px;
padding:10px;
font-weight:600;
letter-spacing:.05em;
box-shadow:0 10px 25px rgba(99,102,241,0.6);
}

.btn-login:hover{
transform:translateY(-1px);
box-shadow:0 14px 30px rgba(99,102,241,0.8);
}

/* footer */

.login-footer{
text-align:center;
font-size:.75rem;
color:#9ca3af;
margin-top:15px;
}

/* online indicator */

.system-status{
text-align:center;
font-size:.7rem;
margin-bottom:10px;
color:#22c55e;
}

.system-status::before{
content:"● ";
}

/* spinner */

.spinner-border{
width:16px;
height:16px;
border-width:2px;
margin-right:6px;
}

</style>

</head>

<body>

<div class="login-card">

<div class="login-logo">
<img src="logo.png">
</div>

<div class="login-title">
NORTH MED DIAGNOSTICS
</div>

<div class="login-subtitle">
Laboratory Inventory System
</div>

<div class="system-status">
System Online
</div>

<form id="loginForm">

<div class="mb-3 input-group">

<span class="input-group-text">👤</span>

<input
type="text"
class="form-control"
id="username"
placeholder="Username"
required>

</div>


<div class="mb-2 input-group">

<span class="input-group-text">🔒</span>

<input
type="password"
class="form-control"
id="password"
placeholder="Password"
required>

<button
type="button"
class="input-group-text"
onclick="togglePassword()">

👁

</button>

</div>


<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox"
id="rememberMe">

<label class="form-check-label" for="rememberMe">
Remember me
</label>

</div>

<div id="loginError" class="text-danger small mb-2" hidden></div>

<button id="loginBtn" class="btn-login">

<span id="loginText">SIGN IN</span>

</button>

</form>

<div class="login-footer">
North Med Diagnostics • Internal System
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = 'https://ugvlfuxqqvimncuyztgm.supabase.co';
const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVndmxmdXhxcXZpbW5jdXl6dGdtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyODg5NzksImV4cCI6MjA4NTg2NDk3OX0.Gxi3Z8YexMgV6BKAvUUeUZl2mfKAWViSwdVmRE9Lry0';

const supabaseClient = window.supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

const USERNAME_EMAIL_DOMAIN = 'northmed.local';


function togglePassword(){

const input=document.getElementById("password");

input.type=input.type==="password"
?"text"
:"password";

}


async function handleLogin(e){

e.preventDefault();

const btn=document.getElementById("loginBtn");
const text=document.getElementById("loginText");

btn.disabled=true;

text.innerHTML=
'<span class="spinner-border"></span>Signing in...';

const username=document.getElementById("username").value.trim();
const password=document.getElementById("password").value;

const errorBox=document.getElementById("loginError");

errorBox.hidden=true;

const email=username.includes("@")
?username
:`${username}@${USERNAME_EMAIL_DOMAIN}`;

const {error}=await supabaseClient.auth.signInWithPassword({
email,
password
});

if(error){

errorBox.textContent=error.message||"Login failed";
errorBox.hidden=false;

btn.disabled=false;
text.innerHTML="SIGN IN";

return;

}

window.location.href="index.html";

}

document
.getElementById("loginForm")
.addEventListener("submit",handleLogin);

</script>

</body>
</html>
